<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Trend</title>

<style>

/* ===== GLOBAL ===== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
background:#0f0f0f;
color:white;
line-height:1.6;
}

/* ===== NAVBAR ===== */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#111;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:bold;
color:#ff3c78;
}

nav ul{
display:flex;
list-style:none;
}

nav ul li{
margin-left:25px;
}

nav ul li a{
text-decoration:none;
color:white;
font-size:15px;
}

nav ul li a:hover{
color:#ff3c78;
}

.cart-btn{
background:#ff3c78;
padding:7px 14px;
border-radius:5px;
cursor:pointer;
}

/* ===== HERO ===== */

.hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("https://picsum.photos/1600/900?fashion");
background-size:cover;
}

.hero h1{
font-size:55px;
letter-spacing:2px;
}

.hero p{
margin-top:10px;
font-size:18px;
color:#ddd;
}

.hero button{
margin-top:20px;
padding:12px 25px;
border:none;
background:#ff3c78;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

/* ===== SECTION ===== */

section{
padding:70px 8%;
}

/* ===== SEARCH ===== */

.search{
text-align:center;
margin-bottom:30px;
}

.search input{
padding:10px;
width:250px;
border:none;
border-radius:4px;
}

/* ===== PRODUCTS ===== */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.product{
background:#1b1b1b;
padding:15px;
border-radius:10px;
transition:.3s;
}

.product:hover{
transform:translateY(-6px);
}

.product img{
width:100%;
height:170px;
object-fit:cover;
border-radius:6px;
}

.product h3{
margin:10px 0;
}

.product button{
width:100%;
padding:8px;
border:none;
background:#ff3c78;
color:white;
border-radius:4px;
cursor:pointer;
}

/* ===== CART ===== */

.cart{
position:fixed;
right:-350px;
top:0;
width:320px;
height:100%;
background:#111;
padding:20px;
transition:.3s;
overflow:auto;
}

.cart.active{
right:0;
}

.cart h2{
margin-bottom:15px;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
font-size:14px;
}

.cart-item button{
background:red;
border:none;
color:white;
cursor:pointer;
padding:3px 6px;
}

/* ===== FOOTER ===== */

footer{
background:#111;
padding:25px;
text-align:center;
margin-top:40px;
color:#aaa;
}

/* ===== MOBILE ===== */

@media(max-width:768px){

nav ul{
display:none;
}

.hero h1{
font-size:36px;
}

}

</style>
</head>

<body>

<!-- ===== NAVBAR ===== -->

<nav>

<div class="logo">Studio Trend</div>

<ul>
<li><a href="#home">Home</a></li>
<li><a href="#shop">Shop</a></li>
<li><a href="#contact">Contact</a></li>
</ul>

<div class="cart-btn" onclick="toggleCart()">
Cart (<span id="count">0</span>)
</div>

</nav>

<!-- ===== HERO ===== -->

<section class="hero" id="home">

<h1>Studio Trend</h1>
<p>Modern Fashion & Tech Store</p>

<button onclick="scrollToShop()">Shop Now</button>

</section>

<!-- ===== SHOP ===== -->

<section id="shop">

<h2 style="text-align:center;margin-bottom:20px;">Trending Products</h2>

<div class="search">
<input type="text" id="search" placeholder="Search products...">
</div>

<div class="products" id="products"></div>

</section>

<!-- ===== CART ===== -->

<div class="cart" id="cart">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3>Total: ₹<span id="total">0</span></h3>

</div>

<!-- ===== CONTACT ===== -->

<section id="contact">

<h2 style="text-align:center;margin-bottom:15px;">Contact</h2>

<p style="text-align:center">Email: support@studiotrend.com</p>
<p style="text-align:center">Phone: +91 9876543210</p>

</section>

<footer>

© 2026 Studio Trend — All Rights Reserved

</footer>

<script>

/* ===== PRODUCTS ===== */

const products=[

{id:1,name:"Designer Jacket",price:4500,img:"https://picsum.photos/300?1"},
{id:2,name:"Sneakers",price:3200,img:"https://picsum.photos/300?2"},
{id:3,name:"Smart Watch",price:6500,img:"https://picsum.photos/300?3"},
{id:4,name:"Backpack",price:1800,img:"https://picsum.photos/300?4"},
{id:5,name:"Headphones",price:2400,img:"https://picsum.photos/300?5"},
{id:6,name:"Laptop",price:52000,img:"https://picsum.photos/300?6"},
{id:7,name:"Gaming Mouse",price:1400,img:"https://picsum.photos/300?7"},
{id:8,name:"Sunglasses",price:900,img:"https://picsum.photos/300?8"}

]

let cart=[]

const productContainer=document.getElementById("products")

function displayProducts(list){

productContainer.innerHTML=""

list.forEach(p=>{

productContainer.innerHTML+=`

<div class="product">

<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button onclick="addCart(${p.id})">Add to Cart</button>

</div>

`

})

}

displayProducts(products)

/* ===== SEARCH ===== */

document.getElementById("search").addEventListener("keyup",e=>{

const value=e.target.value.toLowerCase()

const filtered=products.filter(p=>p.name.toLowerCase().includes(value))

displayProducts(filtered)

})

/* ===== CART ===== */

function addCart(id){

const product=products.find(p=>p.id===id)

cart.push(product)

updateCart()

}

function updateCart(){

const cartItems=document.getElementById("cartItems")

cartItems.innerHTML=""

let total=0

cart.forEach((item,index)=>{

total+=item.price

cartItems.innerHTML+=`

<div class="cart-item">
${item.name} ₹${item.price}
<button onclick="removeItem(${index})">X</button>
</div>

`

})

document.getElementById("count").innerText=cart.length
document.getElementById("total").innerText=total

}

function removeItem(index){

cart.splice(index,1)

updateCart()

}

/* ===== CART TOGGLE ===== */

function toggleCart(){

document.getElementById("cart").classList.toggle("active")

}

/* ===== SCROLL ===== */

function scrollToShop(){

document.getElementById("shop").scrollIntoView({behavior:"smooth"})

}

</script>

</body>
</html>
