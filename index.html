<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My E-Commerce Store</title>

<style>

/* GENERAL */

body{
font-family: Arial;
margin:0;
background:#f4f4f4;
}

h1,h2{
text-align:center;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
background:#222;
color:white;
padding:15px;
}

nav a{
color:white;
text-decoration:none;
margin:10px;
}

.cart-icon{
cursor:pointer;
background:orange;
padding:8px 15px;
border-radius:5px;
}

/* HERO SECTION */

.hero{
background:url("https://images.unsplash.com/photo-1607083206968-13611e3d76db") center/cover;
height:300px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:40px;
font-weight:bold;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
text-align:center;
}

.product img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.product button{
background:#28a745;
color:white;
border:none;
padding:10px;
margin-top:10px;
cursor:pointer;
border-radius:5px;
}

/* CART */

.cart{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-2px 0 10px rgba(0,0,0,0.3);
padding:20px;
overflow:auto;
display:none;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.cart button{
background:red;
color:white;
border:none;
padding:5px;
cursor:pointer;
}

/* FOOTER */

footer{
background:#222;
color:white;
text-align:center;
padding:20px;
margin-top:20px;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav>
<div><b>MyShop</b></div>

<div>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Contact</a>
</div>

<div class="cart-icon" onclick="toggleCart()">
Cart (<span id="cart-count">0</span>)
</div>

</nav>

<!-- HERO -->

<div class="hero">
Big Sale Today
</div>

<h2>Featured Products</h2>

<!-- PRODUCTS -->

<div class="products" id="product-list"></div>


<!-- CART PANEL -->

<div class="cart" id="cart">

<h2>Your Cart</h2>

<div id="cart-items"></div>

<h3>Total: ₹<span id="cart-total">0</span></h3>

<button onclick="toggleCart()">Close</button>

</div>

<footer>
<p>© 2026 MyShop E-Commerce Website</p>
</footer>

<script>

/* PRODUCTS DATA */

const products = [
{id:1,name:"Laptop",price:50000,img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8"},
{id:2,name:"Smartphone",price:20000,img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"},
{id:3,name:"Headphones",price:3000,img:"https://images.unsplash.com/photo-1518441902111-a6c8f4e9e3f1"},
{id:4,name:"Smart Watch",price:5000,img:"https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b"},
{id:5,name:"Camera",price:25000,img:"https://images.unsplash.com/photo-1519183071298-a2962e402c43"},
{id:6,name:"Shoes",price:2000,img:"https://images.unsplash.com/photo-1528701800489-20be3c1b9e89"},
{id:7,name:"Backpack",price:1500,img:"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"},
{id:8,name:"Gaming Mouse",price:1200,img:"https://images.unsplash.com/photo-1587202372775-e229f172b9d7"}
];


/* CART */

let cart = [];


/* DISPLAY PRODUCTS */

const productList = document.getElementById("product-list");

products.forEach(product => {

const div = document.createElement("div");
div.classList.add("product");

div.innerHTML = `
<img src="${product.img}">
<h3>${product.name}</h3>
<p>₹${product.price}</p>
<button onclick="addToCart(${product.id})">Add to Cart</button>
`;

productList.appendChild(div);

});


/* ADD TO CART */

function addToCart(id){

const product = products.find(p=>p.id===id);

cart.push(product);

updateCart();

}


/* UPDATE CART */

function updateCart(){

const cartItems = document.getElementById("cart-items");
cartItems.innerHTML="";

let total = 0;

cart.forEach((item,index)=>{

total += item.price;

cartItems.innerHTML += `
<div class="cart-item">
${item.name} - ₹${item.price}
<button onclick="removeItem(${index})">X</button>
</div>
`;

});

document.getElementById("cart-total").innerText = total;
document.getElementById("cart-count").innerText = cart.length;

}


/* REMOVE ITEM */

function removeItem(index){

cart.splice(index,1);

updateCart();

}


/* TOGGLE CART */

function toggleCart(){

const cartPanel = document.getElementById("cart");

cartPanel.style.display =
cartPanel.style.display === "block" ? "none" : "block";

}

</script>

</body>
</html>
